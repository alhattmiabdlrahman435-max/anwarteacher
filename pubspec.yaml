name: anwarteacher
description: "A new Flutter project for teachers."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  go_router: ^17.3.0
  dio: ^5.9.2
  intl: ^0.20.2
  flutter_svg: ^2.3.0
  flutter_secure_storage: ^10.3.1
  phosphor_flutter: ^2.1.0
  shared_preferences: ^2.5.5
  table_calendar: ^3.2.0
  url_launcher: ^6.3.1
  flutter_localizations:
    sdk: flutter
  flutter_screenutil: ^5.9.3
  connectivity_plus: ^7.2.0
  cached_network_image: ^3.4.1
  flutter_easyloading: ^3.0.5
  skeletonizer: ^2.1.3
  firebase_core: ^4.11.0
  firebase_crashlytics: ^5.2.4
  upgrader: ^13.5.0
  mobile_scanner: ^7.2.0
  image_picker: ^1.2.2
  file_picker: ^8.1.2
  sqflite_android: 2.4.1
  firebase_messaging: ^16.4.1
  flutter_local_notifications: ^22.0.1
  path_provider: ^2.1.6
  flutter_image_compress: ^2.3.0
  uuid: ^4.5.1
  dart_pusher_channels: ^1.3.1

dependency_overrides:
  sqflite_android: 2.4.1
  path_provider_foundation: 2.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  riverpod_generator: ^4.0.3
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icons/
    - assets/images/

  fonts:
    - family: GoogleSans
      fonts:
        - asset: assets/fonts/Google_Sans/static/GoogleSans-Regular.ttf
        - asset: assets/fonts/Google_Sans/static/GoogleSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/Google_Sans/static/GoogleSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Google_Sans/static/GoogleSans-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.jpeg"
  min_sdk_android: 21

flutter_native_splash:
  color: "#F8FAFC"
  color_dark: "#0F172A"
  android: true
  ios: true
